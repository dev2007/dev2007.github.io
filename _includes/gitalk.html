<section class="comment-area">
  <div class="comment-wrapper">
    {% if site.gitalk-identifier %}
    <div id="gitalk-container" class="article-comments"></div>
    <script url="https://cdn.jsdelivr.net/npm/md5@2.3.0/md5.min.js"></script>
    <script>
      (function () {
        var d = document, 
        s = d.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js';
        (d.head || d.body).appendChild(s);

        link = d.createElement("link");
        link.rel = "stylesheet";
        link.href = "https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css";
        (d.head || d.body).appendChild(link);
        setTimeout(initGitalk,1000);
      })();
      function initGitalk(){
        const gitalk = new Gitalk({
          clientID: '2a33e1cb0be96f2d43a3',
          clientSecret: '0da0b8b354365388cceffecd8c62e35393b635af',
          repo: 'gitalk-comment',      // The repository of store comments,
          owner: 'dev2007',
          admin: ['dev2007'],
          id: MD5(location.pathname),
          distractionFreeMode: false  // Facebook-like distraction free mode
        })

        gitalk.render('gitalk-container')
      };

    </script>
    {% endif %}
  </div>
</section> <!-- End Comment Area -->
